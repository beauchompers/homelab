---
- hosts: container_registry
  become: yes
  tasks:
    - name: Install Docker
      ansible.builtin.import_role:
        name: homelab-containers

    - name: Create Container Registry
      ansible.builtin.import_role:
        name: homelab-container-registry

- hosts: containers
  become: yes
  tasks:
    - name: Install Docker
      ansible.builtin.import_role:
        name: homelab-containers
