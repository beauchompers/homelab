---
- name: Install Docker Compose plugin
  ansible.builtin.apt:
    name: ['docker-compose-plugin']
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install Docker Compose plugin (dnf)
  ansible.builtin.dnf:
    name: ['docker-compose-plugin']
  when: ansible_os_family == "RedHat"
