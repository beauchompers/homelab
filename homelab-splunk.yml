---
- name: Setup Splunk with Docker
  hosts: splunk
  become: true
  vars_files:
    - extra-vars-splunk.yml
  tasks:
    - name: Setup Container Engine
      ansible.builtin.import_role:
        name: homelab-containers

    - name: Setup Splunk
      ansible.builtin.import_role:
        name: homelab-splunk
