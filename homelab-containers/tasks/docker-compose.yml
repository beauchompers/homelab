---
- name: Install Docker Compose plugin
  ansible.builtin.apt:
    name: ['docker-compose-plugin']
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Docker Compose plugin (yum)
  ansible.builtin.yum:
    name: ['docker-compose-plugin']
  when: ansible_os_family == "RedHat"
